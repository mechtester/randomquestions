<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Question Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-image: url('https://imgproxy.nanxiongnandi.com/t-KNemedoGTB_QrI70EH9BSTEGSCPD3Ul7CB0iuT3cY/w:1280/aHR0cHM6Ly9pbWcu/bmFueGlvbmduYW5k/aS5jb20vMjAyNDAy/L0JhY2t5YXJkQmly/ZC5qcGc.jpg');
      background-size: cover;
      background-position: center;
      font-family: 'Roboto', sans-serif;
    }

    .container {
      max-width: 600px;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      font-family: sans-serif;
      color: #333;
    }

    form {
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    input[type="file"] {
      margin-bottom: 10px;
    }

    .btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #45a049;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    .message {
      text-align: center;
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Random Question Generator</h1>
    <form id="uploadForm" action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data">
      <label for="file">Upload Excel File:</label>
      <input type="file" name="file" id="file" accept=".xlsx, .xls" onchange="displayFileName(this)">
      <input type="submit" value="Upload" class="btn" onclick="return checkUpload()">
    </form>
    <div id="message" class="message" style="display: none;">Please upload an Excel file.</div>
    {% if sheet_names %}
      <form action="{{ url_for('shuffle_questions') }}" method="POST">
        <label for="sheet">Select Sheet:</label>
        <select name="sheet" id="sheet">
          {% for sheet_name in sheet_names %}
            <option value="{{ sheet_name }}">{{ sheet_name }}</option>
          {% endfor %}
        </select>
        <input type="submit" value="Start Practice" class="btn">
      </form>
    {% endif %}
  </div>

  <script>
    function checkUpload() {
      var fileInput = document.getElementById('file');
      var messageDiv = document.getElementById('message');

      if (fileInput.value === '') {
        messageDiv.style.display = 'block';
        return false; // Prevent form submission
      } else {
        messageDiv.style.display = 'none';
        return true; // Allow form submission
      }
    }

    function displayFileName(input) {
      var fileName = input.files[0].name;
      input.nextElementSibling.textContent = fileName;
    }
  </script>

</body>
</html>
