<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Sheet</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-image: url('https://h2.gifposter.com/bingImages/Schmetterlingswiese_1920x1080.jpg');
      /* Specify the path to your background image */
      background-size: cover;
      background-position: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      color: #333;
      font-size: 28px;
    }

    form {
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-family: 'Poppins', sans-serif;
      /* Apply the Google Fonts to the select dropdown */
    }

    .btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
    }

    .btn:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Select Sheet</h1>
    <form action="{{ url_for('shuffle_questions') }}" method="POST">
      <select name="sheet" id="sheet">
        {% for sheet_name in sheet_names %}
        <option value="{{ sheet_name }}">{{ sheet_name }}</option>
        {% endfor %}
      </select>
      <input type="submit" value="Start Practice" class="btn">
    </form>
  </div>
</body>

</html>
