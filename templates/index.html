<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Question Generator</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-image: url('https://imgproxy.nanxiongnandi.com/t-KNemedoGTB_QrI70EH9BSTEGSCPD3Ul7CB0iuT3cY/w:1280/aHR0cHM6Ly9pbWcu/bmFueGlvbmduYW5k/aS5jb20vMjAyNDAy/L0JhY2t5YXJkQmly/ZC5qcGc.jpg');
      /* Specify the path to your background image */
      background-size: cover;
      background-position: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.9);
      /* Added an opacity to the background color */
      border-radius: 30px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      /* Make the text bold */
      font-family: sans-serif;
      /* Use a sans-serif font */
      color: #333;
      /* Set the text color */
      font-size: 28px;
    }

    form {
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    input[type="file"] {
      margin-bottom: 10px;
      font-family: 'Poppins', sans-serif;
      /* Apply the Google Fonts to the input */
    }

    .btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      font-family: 'Poppins', sans-serif;
      /* Apply the Google Fonts to the button */
      font-size: 16px;
    }

    .btn:hover {
      background-color: #45a049;
    }

    .message {
      text-align: center;
      color: red;
      margin-top: 10px;
    }

    /* Custom styling for the sample template link */
    .sample-link {
      text-align: center;
      margin-top: 20px;
    }

    .sample-link a {
      color: #333;
      text-decoration: underline;
    }

    .sample-link a:hover {
      color: #45a049;
    }

    /* Custom styling for the note section */
    .note-section {
      margin-top: 30px;
      padding: 10px;
      background-color: #f9f9f9;
      border-radius: 5px;
    }

    .note {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Random Question Generator</h1>
    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
      <label for="file">Upload Excel File:</label>
      <input type="file" name="file" id="file" accept=".xlsx, .xls" onchange="displayFileName(this)">

      <input type="submit" value="Upload" class="btn" onclick="return checkUpload()">
    </form>
    <div id="message" class="message" style="display: none;">Please upload an Excel file.</div>

    <!-- Sample template link -->
    <div class="sample-link">
      <a href="https://github.com/mechtester/randomquestions/raw/main/Sample%20Template.xlsx">Download Sample Template</a>
    </div>
    <div class="sample-link">
      <a href="https://github.com/mechtester/randomquestions">Github Repository</a>
    </div>

    <!-- Note section -->
    <div class="note-section">
      <p class="note">Note: If questions and answers do not appear clearly, please clear your browser's cookies and caches. Then start the application again.</p>
    </div>
  </div>

  <script>
    function checkUpload() {
      var fileInput = document.getElementById('file');
      var messageDiv = document.getElementById('message');

      if (fileInput.value === '') {
        messageDiv.style.display = 'block';
        return false; // Prevent form submission
      } else {
        messageDiv.style.display = 'none';
        return true; // Allow form submission
      }
    }

    function displayFileName(input) {
      var fileName = input.files[0].name;
      document.getElementById('fileNameSpan').textContent = fileName;
    }
  </script>
</body>

</html>
